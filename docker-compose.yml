version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: seattleblue-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: seattleblue
      POSTGRES_USER: seattleblue_user
      POSTGRES_PASSWORD: seattleblue_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
